name: Build OpenEMS Docker Image (Fork)
on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main
      - evcc-loadpoint-meter-base-value-approach
    
jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        image: [edge, ui-edge]
        include:
          - image: edge
            dockerfile: tools/docker/edge/Dockerfile
          - image: ui-edge
            dockerfile: tools/docker/ui/Dockerfile.edge
    permissions:
        packages: write
        contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          labels: |
            org.opencontainers.image.authors=${{ github.repository_owner }}
            org.opencontainers.image.title=OpenEMS ${{ matrix.image }} (Fork)
            org.opencontainers.image.vendor=${{ github.repository_owner }}
          tags: |
            type=semver,pattern={{raw}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=${{ github.ref_name }}
            
      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64, linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

